name: FlashDB C→Rust Migration Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================
  # Job 1: 使用 OpenCode + Skill 执行 C→Rust 转换
  # ============================================================
  convert:
    name: "Convert: FlashDB C → Rust"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # 使用 Environment Secrets，只有审批通过后才会注入 API key
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3 libtinfo6
          # Bundled clang++ needs libtinfo.so.5, symlink from libtinfo6
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5

      - name: Download c-to-rust skill from release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          mkdir -p .opencode/skills
          gh release download v0.1.1-beta \
            --repo Shadow-Azure/c_cpp_to_rust \
            -p "c-to-rust-linux-x86_64.tar.gz" \
            -D /tmp
          tar xzf /tmp/c-to-rust-linux-x86_64.tar.gz -C .opencode/skills/
          mv .opencode/skills/c-to-rust-linux-x86_64 .opencode/skills/c-to-rust
          chmod +x .opencode/skills/c-to-rust/bin/*
          rm /tmp/c-to-rust-linux-x86_64.tar.gz
          # Remove smoke-c2rust to avoid opencode loading wrong skill
          rm -rf .opencode/skills/smoke-c2rust
          echo "✅ c-to-rust skill downloaded and extracted"
          ls -la .opencode/skills/c-to-rust/
          .opencode/skills/c-to-rust/bin/ir --version 2>&1 || echo "ir version check done"

      - name: Run OpenCode conversion
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PATH: ${{ github.workspace }}/.opencode/skills/c-to-rust/bin:${{ env.PATH }}
          LD_LIBRARY_PATH: ${{ github.workspace }}/.opencode/skills/c-to-rust/lib
        run: |
          opencode run \
            --model "deepseek/deepseek-v4-flash" \
            --agent build \
            --title "FlashDB C→Rust conversion" \
            "/c-to-rust"

      - name: Upload converted Rust code
        uses: actions/upload-artifact@v4
        with:
          name: rust-flashdb
          path: rust-flashdb/
          retention-days: 7

  # ============================================================
  # Job 2: 评测转换结果
  # ============================================================
  evaluate:
    name: "Evaluate: Compile + Test + Performance"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: convert
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download converted Rust code
        uses: actions/download-artifact@v4
        with:
          name: rust-flashdb
          path: rust-flashdb/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y bc python3

      # --- 编译评测 ---
      - name: "Evaluate: Compilation"
        id: compile
        run: |
          bash scripts/eval-compile.sh > /tmp/compile-result.json 2>/tmp/compile-detail.log
          echo "result-file=/tmp/compile-result.json" >> $GITHUB_OUTPUT

      # --- 测试评测 ---
      - name: "Evaluate: Tests"
        id: tests
        run: |
          bash scripts/eval-tests.sh > /tmp/test-result.json 2>/tmp/test-detail.log
          echo "result-file=/tmp/test-result.json" >> $GITHUB_OUTPUT

      # --- C 构建工具 (功能等价 + 性能测试都需要) ---
      - name: Install C build tools
        run: sudo apt-get install -y gcc make

      # --- 功能等价评测 ---
      - name: "Evaluate: FFI Equivalence"
        id: equiv
        run: |
          bash scripts/eval-equivalence.sh > /tmp/equiv-result.json 2>/tmp/equiv-detail.log
          echo "result-file=/tmp/equiv-result.json" >> $GITHUB_OUTPUT

      # --- 性能评测 ---
      - name: "Evaluate: Performance"
        id: perf
        run: |
          bash scripts/eval-performance.sh > /tmp/perf-result.json 2>/tmp/perf-detail.log
          echo "result-file=/tmp/perf-result.json" >> $GITHUB_OUTPUT

      # --- 聚合评分 ---
      - name: "Aggregate: Score"
        id: score
        run: |
          python3 scripts/aggregate-score.py \
            /tmp/compile-result.json \
            /tmp/test-result.json \
            /tmp/equiv-result.json \
            /tmp/perf-result.json \
            /tmp/eval-report.md

      # --- 输出报告 ---
      - name: "Report: Job Summary"
        if: always()
        run: |
          if [ -f /tmp/eval-report.md ]; then
            cat /tmp/eval-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ 评测报告生成失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请检查转换 Job 的输出。" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            /tmp/eval-report.md
            /tmp/compile-result.json
            /tmp/test-result.json
            /tmp/equiv-result.json
            /tmp/perf-result.json
          retention-days: 30

      - name: Fail if evaluation failed
        if: steps.score.outcome == 'failure'
        run: exit 1
