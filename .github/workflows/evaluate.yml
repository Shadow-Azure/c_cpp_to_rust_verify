name: FlashDB C→Rust Migration Evaluation

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  SKILL_VERSION: v0.9.0

jobs:
  # ============================================================
  # Job 1: 使用 OpenCode + Skill 执行 C→Rust 转换 (Docker)
  # ============================================================
  convert:
    name: "Convert: FlashDB C → Rust"
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang bear make gcc bc python3 curl wget jq

      - name: Install opencode
        run: |
          # Install opencode from npm
          npm install -g opencode-ai
          opencode --version

      - name: Verify environment
        run: |
          opencode --version
          gh --version
          clang --version | head -1
          make --version | head -1

      - name: Cache c-to-rust skill
        id: cache-skill
        uses: actions/cache@v4
        with:
          path: .opencode/skills/c-to-rust
          key: c-to-rust-skill-${{ env.SKILL_VERSION }}-${{ runner.os }}

      - name: Download c-to-rust skill from release
        if: steps.cache-skill.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          mkdir -p .opencode/skills
          gh release download ${{ env.SKILL_VERSION }} \
            --repo Shadow-Azure/c_cpp_to_rust \
            -p "c-to-rust-linux-x86_64.tar.gz" \
            -D /tmp
          tar xzf /tmp/c-to-rust-linux-x86_64.tar.gz -C .opencode/skills/
          mv .opencode/skills/c-to-rust-linux-x86_64 .opencode/skills/c-to-rust
          chmod +x .opencode/skills/c-to-rust/bin/*
          rm /tmp/c-to-rust-linux-x86_64.tar.gz
          echo "✅ c-to-rust skill downloaded and extracted"

      - name: Setup c-to-rust skill
        run: |
          # Remove smoke-c2rust to avoid opencode loading wrong skill
          rm -rf .opencode/skills/smoke-c2rust

          # Detect clang version and find include directory
          CLANG_VERSION=$(clang++ --version 2>/dev/null | grep -oP 'clang version \K[0-9]+' || echo "")
          echo "Detected clang version: $CLANG_VERSION"

          # Find the actual include directory (may have minor version like 14.0.0)
          SYS_RES=""
          if [ -n "$CLANG_VERSION" ]; then
            # Try exact version first, then with .0.0 suffix
            for ver in "${CLANG_VERSION}" "${CLANG_VERSION}.0" "${CLANG_VERSION}.0.0"; do
              candidate="/usr/lib/llvm-${CLANG_VERSION}/lib/clang/${ver}"
              if [ -d "$candidate/include" ]; then
                SYS_RES="$candidate"
                echo "✅ Found clang headers at: $SYS_RES"
                break
              fi
            done
          fi

          # Fallback: find any clang include directory
          if [ -z "$SYS_RES" ]; then
            SYS_RES=$(find /usr/lib/llvm-* -path "*/lib/clang/*/include" -type d 2>/dev/null | head -1 | sed 's|/include$||')
            if [ -n "$SYS_RES" ]; then
              echo "✅ Found clang headers via fallback: $SYS_RES"
            fi
          fi

          echo "SYS_RES=$SYS_RES exists=$(test -d "$SYS_RES/include" && echo yes || echo no)"

          # Check if skill has bundled clang headers
          BUNDLED_RES=".opencode/skills/c-to-rust/lib/clang/${CLANG_VERSION}"
          echo "BUNDLED_RES=$BUNDLED_RES exists=$(test -d $BUNDLED_RES && echo yes || echo no)"

          if [ -n "$SYS_RES" ] && [ -d "$SYS_RES/include" ]; then
            # Copy to bundled location for multiple possible version paths
            for ver in "${CLANG_VERSION}" "18" "15"; do
              BUNDLED=".opencode/skills/c-to-rust/lib/clang/${ver}"
              mkdir -p "$BUNDLED"
              rm -rf "$BUNDLED/include"
              cp -r "$SYS_RES/include" "$BUNDLED/include"
              echo "✅ Copied clang headers: $SYS_RES/include -> $BUNDLED/include"
            done
            ls "$BUNDLED_RES/include/" | head -5
          else
            echo "⚠️ Could not find system clang headers"
          fi

          # Copy agents from skill to opencode config
          if [ -d ".opencode/skills/c-to-rust/agents" ]; then
            mkdir -p .opencode/agents
            cp -r .opencode/skills/c-to-rust/agents/* .opencode/agents/
            echo "✅ Agents configured:"
            ls -la .opencode/agents/
          else
            echo "⚠️ No agents directory in skill"
          fi

          echo "✅ c-to-rust skill ready"
          ls -la .opencode/skills/c-to-rust/
          .opencode/skills/c-to-rust/bin/ir --version 2>&1 || echo "ir version check done"
          clang++ --version 2>&1 | head -3 || echo "clang++ check done"

      - name: Generate compile_commands.json with bear
        run: |
          cd flashdb
          bear -- make -C tests clean all
          echo "✅ compile_commands.json generated"
          cat compile_commands.json | python3 -m json.tool | head -30

      - name: Fix compile_commands.json for C mode
        run: |
          # Bundled clang++ treats .c files as C++, causing void* implicit
          # conversion errors. Add "-x c" to force C mode.
          python3 -c "
          import json
          with open('flashdb/compile_commands.json') as f:
              cmds = json.load(f)
          for cmd in cmds:
              args = cmd.get('arguments', [])
              if '-x' not in args:
                  # Insert '-x c' after the compiler binary
                  cmd['arguments'] = [args[0], '-x', 'c'] + args[1:]
          with open('flashdb/compile_commands.json', 'w') as f:
              json.dump(cmds, f, indent=2)
          "
          echo "✅ Added -x c to compile_commands.json"
          cat flashdb/compile_commands.json | python3 -m json.tool | head -20

      - name: Upload compile_commands.json
        uses: actions/upload-artifact@v4
        with:
          name: compile-commands
          path: flashdb/compile_commands.json
          retention-days: 7

      - name: Initialize compile trajectory
        # Truncate any stale trajectory from a prior run. The compile-tracker
        # OpenCode plugin (.opencode/plugins/compile-tracker.ts) appends one
        # JSONL record per `cargo check` / `cargo build` invocation during the
        # conversion, giving visibility into the codegen baseline -> each
        # Phase 6 fix round -> final error count.
        run: |
          : > /tmp/compile-trajectory.jsonl
          echo "compile trajectory initialized: /tmp/compile-trajectory.jsonl"

      - name: Configure MiniMax provider
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          # Create opencode.json with MiniMax provider configuration
          cat > opencode.json <<'EOF'
          {
            "provider": {
              "minimax": {
                "npm": "@ai-sdk/openai-compatible",
                "options": {
                  "baseURL": "https://api.minimaxi.com/v1",
                  "apiKey": "${MINIMAX_API_KEY}",
                  "setCacheKey": true
                },
                "models": {
                  "MiniMax-M2.7-highspeed": {
                    "name": "MiniMax-M2.7-highspeed"
                  }
                }
              }
            }
          }
          EOF
          # Replace placeholder with actual key
          sed -i "s|\${MINIMAX_API_KEY}|${MINIMAX_API_KEY}|g" opencode.json
          echo "✅ opencode.json created with MiniMax provider"

      - name: Run OpenCode conversion
        run: |
          export PATH="$(pwd)/.opencode/skills/c-to-rust/bin:$PATH"
          export LD_LIBRARY_PATH="$(pwd)/.opencode/skills/c-to-rust/lib:${LD_LIBRARY_PATH:-}"
          export CLANG_CXX="clang++"

          # Find clang include directory (handle version suffix like 14.0.0)
          CLANG_VERSION=$(clang++ --version 2>/dev/null | grep -oP 'clang version \K[0-9]+' || echo "")
          CLANG_INCLUDE=""
          if [ -n "$CLANG_VERSION" ]; then
            for ver in "${CLANG_VERSION}" "${CLANG_VERSION}.0" "${CLANG_VERSION}.0.0"; do
              candidate="/usr/lib/llvm-${CLANG_VERSION}/lib/clang/${ver}/include"
              if [ -d "$candidate" ]; then
                CLANG_INCLUDE="$candidate"
                break
              fi
            done
          fi

          # Fallback: find any clang include directory
          if [ -z "$CLANG_INCLUDE" ]; then
            CLANG_INCLUDE=$(find /usr/lib/llvm-* -path "*/lib/clang/*/include" -type d 2>/dev/null | head -1)
          fi

          if [ -n "$CLANG_INCLUDE" ]; then
            export CPATH="$CLANG_INCLUDE:${CPATH:-}"
            export C_INCLUDE_PATH="$CLANG_INCLUDE:${C_INCLUDE_PATH:-}"
            echo "✅ Set CPATH to $CLANG_INCLUDE"
          else
            echo "⚠️ Clang include directory not found"
          fi

          # Start a background session-export loop so that intermediate progress
          # is visible in CI logs even if the run is killed by timeout.
          # Every 5 minutes, export the latest session tail to stderr.
          (
            while true; do
              sleep 300
              SESSION_ID=$(opencode session list --format json 2>/dev/null | python3 -c "
          import json, sys
          try:
              sessions = json.load(sys.stdin)
              if sessions: print(sessions[0]['id'])
          except: pass
          " 2>/dev/null || echo "")
              if [ -n "$SESSION_ID" ]; then
                echo "=== Periodic session export (5min checkpoint) ===" >&2
                opencode export "$SESSION_ID" 2>/dev/null | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              msgs = data.get('messages', []) if isinstance(data, dict) else []
              for m in msgs[-5:]:
                  role = m.get('role','?')
                  content = str(m.get('content',''))[:500]
                  print(f'  [{role}] {content}', file=sys.stderr)
          except: pass
          " 2>&1 || echo "  (export failed)" >&2
              fi
            done
          ) &
          EXPORT_PID=$!

          # Run opencode. Structured tool-call summaries are provided by the
          # ci-logger plugin (.opencode/plugins/ci-logger.ts) instead of the
          # noisy --print-logs flag.
          opencode run \
            --dangerously-skip-permissions \
            --model "minimax/MiniMax-M2.7-highspeed" \
            --agent build \
            --title "FlashDB C→Rust conversion" \
            "使用 c-to-rust skill 重构 C 语言的 flashdb 工程为 rust 语言。注意：1) PATH 和 LD_LIBRARY_PATH 已配置好，ir/translator/clang++ 直接可用，不需要 Docker。2) flashdb/compile_commands.json 已预生成且已添加 -x c 标志（强制 C 模式），跳过 Phase 1，不要修改 compile_commands.json。3) 输出目录必须是 rust-flashdb/（不是 flashdb-rust/）。4) Phase 4 translator refine 阶段，处理完 9 个函数后立即结束，跳过后续函数的处理。"

          # Stop the background export loop
          kill $EXPORT_PID 2>/dev/null || true

      - name: Verify tests compile
        run: |
          cd rust-flashdb
          cargo test --no-run 2>&1 | tee /tmp/test-compile.log

      - name: Upload test-compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-compile-log
          path: /tmp/test-compile.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Export opencode sessions
        if: always()
        run: |
          export PATH="$(pwd)/.opencode/skills/c-to-rust/bin:$PATH"
          export LD_LIBRARY_PATH="$(pwd)/.opencode/skills/c-to-rust/lib:${LD_LIBRARY_PATH:-}"
          mkdir -p /tmp/opencode-sessions
          SESSION_IDS=$(opencode session list --format json 2>/dev/null | python3 -c "
          import json, sys
          try:
              sessions = json.load(sys.stdin)
              for s in sessions:
                  print(s['id'])
          except:
              pass
          " || echo "")
          if [ -n "$SESSION_IDS" ]; then
            echo "Found sessions: $(echo "$SESSION_IDS" | wc -l)"
            for SID in $SESSION_IDS; do
              echo "Exporting session: $SID"
              opencode export "$SID" > "/tmp/opencode-sessions/session-${SID}.json" 2>&1 || echo "export failed for $SID"
            done
          else
            echo "No sessions found to export"
            echo '{"error": "no sessions found"}' > /tmp/opencode-sessions/no-sessions.json
          fi

      - name: Upload opencode sessions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-sessions
          path: /tmp/opencode-sessions/
          retention-days: 30

      - name: Upload compile trajectory
        # One JSONL line per cargo check/build during the conversion.
        # OBSERVABILITY ONLY — this plugin never affects scoring or pass/fail.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-trajectory
          path: /tmp/compile-trajectory.jsonl
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload incremental assembly errors
        # Detailed per-module errors from translator assemble-incremental --errors-file.
        # OBSERVABILITY ONLY — this file is never used for scoring.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incremental-errors
          path: /tmp/incremental-errors.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload incremental progress
        # Per-module progress from translator assemble-incremental --progress-file.
        # OBSERVABILITY ONLY — this file is never used for scoring.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incremental-progress
          path: /tmp/incremental-progress.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload converted Rust code
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-flashdb
          path: rust-flashdb/
          retention-days: 7

  # ============================================================
  # Job 2: 评测转换结果
  # ============================================================
  evaluate:
    name: "Evaluate: Compile + Test + Performance"
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: convert
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download converted Rust code
        uses: actions/download-artifact@v4
        with:
          name: rust-flashdb
          path: rust-flashdb/

      - name: Install system dependencies
        continue-on-error: true
        run: |
          # 使用阿里云镜像源加速下载
          sed -i 's|http://archive.ubuntu.com|http://mirrors.aliyun.com|g' /etc/apt/sources.list
          sed -i 's|http://security.ubuntu.com|http://mirrors.aliyun.com|g' /etc/apt/sources.list
          apt-get update && apt-get install -y bc python3

      # --- 编译评测 ---
      - name: "Evaluate: Compilation"
        id: compile
        run: |
          bash scripts/eval-compile.sh > /tmp/compile-result.json
          echo "result-file=/tmp/compile-result.json" >> $GITHUB_OUTPUT

      # --- 测试评测 ---
      - name: "Evaluate: Tests"
        id: tests
        run: |
          bash scripts/eval-tests.sh > /tmp/test-result.json
          echo "result-file=/tmp/test-result.json" >> $GITHUB_OUTPUT

      # --- 功能等价评测 ---
      - name: "Evaluate: FFI Equivalence"
        id: equiv
        run: |
          bash scripts/eval-equivalence.sh > /tmp/equiv-result.json 2>/tmp/equiv-detail.log
          echo "result-file=/tmp/equiv-result.json" >> $GITHUB_OUTPUT

      # --- 性能评测 ---
      - name: "Evaluate: Performance"
        id: perf
        run: |
          bash scripts/eval-performance.sh > /tmp/perf-result.json 2>/tmp/perf-detail.log
          echo "result-file=/tmp/perf-result.json" >> $GITHUB_OUTPUT

      # --- 聚合评分 ---
      - name: "Aggregate: Score"
        id: score
        run: |
          python3 scripts/aggregate-score.py \
            /tmp/compile-result.json \
            /tmp/test-result.json \
            /tmp/equiv-result.json \
            /tmp/perf-result.json \
            /tmp/eval-report.md

      - name: Download compile trajectory
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: compile-trajectory
          path: /tmp/convert-artifacts/
          if-no-files-found: ignore

      - name: Download opencode sessions
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: opencode-sessions
          path: /tmp/convert-artifacts/opencode-sessions/
          if-no-files-found: ignore

      - name: Analyze conversion process
        if: always()
        run: |
          # Find the main session file (first session in the list)
          MAIN_SESSION=$(ls /tmp/convert-artifacts/opencode-sessions/session-*.json 2>/dev/null | head -1)
          if [ -n "$MAIN_SESSION" ]; then
            python3 scripts/analyze-session.py \
              "$MAIN_SESSION" \
              /tmp/convert-artifacts/compile-trajectory.jsonl \
              >> /tmp/eval-report.md 2>/dev/null || true
          else
            echo "No session files found for analysis" >> /tmp/eval-report.md
          fi

      # --- 输出报告 ---
      - name: "Report: Job Summary"
        if: always()
        run: |
          if [ -f /tmp/eval-report.md ]; then
            cat /tmp/eval-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ 评测报告生成失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请检查转换 Job 的输出。" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            /tmp/eval-report.md
            /tmp/compile-result.json
            /tmp/compile-detail.log
            /tmp/test-result.json
            /tmp/test-detail.log
            /tmp/equiv-result.json
            /tmp/equiv-detail.log
            /tmp/perf-result.json
            /tmp/perf-detail.log
          retention-days: 30

      - name: Fail if evaluation failed
        if: steps.score.outcome == 'failure'
        run: exit 1
