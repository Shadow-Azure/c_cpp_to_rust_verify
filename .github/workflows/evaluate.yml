# loop-engineer turn 12 epoch 1782780436 evaluating v0.1.12-beta
name: FlashDB C→Rust Migration Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================
  # Job 1: 使用 OpenCode + Skill 执行 C→Rust 转换
  # ============================================================
  convert:
    name: "Convert: FlashDB C → Rust"
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    # 使用 Environment Secrets，只有审批通过后才会注入 API key
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          # Install libtinfo5 from jammy (22.04) for bundled clang++
          wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb || true
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main"
          sudo apt-get update
          sudo apt-get install -y jq python3 bear clang-18

      - name: Download c-to-rust skill from release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          mkdir -p .opencode/skills
          gh release download v0.1.12-beta \
            --repo Shadow-Azure/c_cpp_to_rust \
            -p "c-to-rust-linux-x86_64.tar.gz" \
            -D /tmp
          tar xzf /tmp/c-to-rust-linux-x86_64.tar.gz -C .opencode/skills/
          mv .opencode/skills/c-to-rust-linux-x86_64 .opencode/skills/c-to-rust
          chmod +x .opencode/skills/c-to-rust/bin/*
          rm /tmp/c-to-rust-linux-x86_64.tar.gz
          # Remove smoke-c2rust to avoid opencode loading wrong skill
          rm -rf .opencode/skills/smoke-c2rust
          # Symlink system clang-18 headers to bundled clang's resource dir
          # Use exact paths (no glob) to avoid matching issues
          BUNDLED_RES=".opencode/skills/c-to-rust/lib/clang/18"
          SYS_RES="/usr/lib/llvm-18/lib/clang/18"
          echo "BUNDLED_RES=$BUNDLED_RES exists=$(test -d $BUNDLED_RES && echo yes || echo no)"
          echo "SYS_RES=$SYS_RES exists=$(test -d $SYS_RES/include && echo yes || echo no)"
          if [ -d "$BUNDLED_RES" ] && [ -d "$SYS_RES/include" ]; then
            mkdir -p "$BUNDLED_RES"
            rm -rf "$BUNDLED_RES/include"
            cp -r "$SYS_RES/include" "$BUNDLED_RES/include"
            echo "✅ Copied clang headers: $SYS_RES/include -> $BUNDLED_RES/include"
            ls "$BUNDLED_RES/include/" | head -5
          else
            echo "⚠️ Could not copy headers, will use CPATH fallback"
          fi
          echo "✅ c-to-rust skill downloaded and extracted"
          ls -la .opencode/skills/c-to-rust/
          .opencode/skills/c-to-rust/bin/ir --version 2>&1 || echo "ir version check done"
          # Verify tools work
          .opencode/skills/c-to-rust/bin/clang++ --version 2>&1 | head -3 || echo "clang++ check done"
          ldd .opencode/skills/c-to-rust/bin/ir 2>&1 | grep "not found" || echo "ir deps OK"

      - name: Generate compile_commands.json with bear
        run: |
          cd flashdb
          bear -- make -C tests clean all
          echo "✅ compile_commands.json generated"
          cat compile_commands.json | python3 -m json.tool | head -30

      - name: Fix compile_commands.json for C mode
        run: |
          # Bundled clang++ treats .c files as C++, causing void* implicit
          # conversion errors. Add "-x c" to force C mode.
          python3 -c "
          import json
          with open('flashdb/compile_commands.json') as f:
              cmds = json.load(f)
          for cmd in cmds:
              args = cmd.get('arguments', [])
              if '-x' not in args:
                  # Insert '-x c' after the compiler binary
                  cmd['arguments'] = [args[0], '-x', 'c'] + args[1:]
          with open('flashdb/compile_commands.json', 'w') as f:
              json.dump(cmds, f, indent=2)
          "
          echo "✅ Added -x c to compile_commands.json"
          cat flashdb/compile_commands.json | python3 -m json.tool | head -20

      - name: Upload compile_commands.json
        uses: actions/upload-artifact@v4
        with:
          name: compile-commands
          path: flashdb/compile_commands.json
          retention-days: 7

      - name: Initialize compile trajectory
        # Truncate any stale trajectory from a prior run. The compile-tracker
        # OpenCode plugin (.opencode/plugins/compile-tracker.ts) appends one
        # JSONL record per `cargo check` / `cargo build` invocation during the
        # conversion, giving visibility into the codegen baseline -> each
        # Phase 6 fix round -> final error count.
        run: |
          : > /tmp/compile-trajectory.jsonl
          echo "compile trajectory initialized: /tmp/compile-trajectory.jsonl"

      - name: Run OpenCode conversion
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          export PATH="$(pwd)/.opencode/skills/c-to-rust/bin:$PATH"
          export LD_LIBRARY_PATH="$(pwd)/.opencode/skills/c-to-rust/lib:${LD_LIBRARY_PATH:-}"
          export CPATH="/usr/lib/llvm-18/lib/clang/18/include:${CPATH:-}"
          export C_INCLUDE_PATH="/usr/lib/llvm-18/lib/clang/18/include:${C_INCLUDE_PATH:-}"

          # Start a background session-export loop so that intermediate progress
          # is visible in CI logs even if the run is killed by timeout.
          # Every 5 minutes, export the latest session tail to stderr.
          (
            while true; do
              sleep 300
              SESSION_ID=$(opencode session list --format json 2>/dev/null | python3 -c "
          import json, sys
          try:
              sessions = json.load(sys.stdin)
              if sessions: print(sessions[0]['id'])
          except: pass
          " 2>/dev/null || echo "")
              if [ -n "$SESSION_ID" ]; then
                echo "=== Periodic session export (5min checkpoint) ===" >&2
                opencode export "$SESSION_ID" 2>/dev/null | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              msgs = data.get('messages', []) if isinstance(data, dict) else []
              for m in msgs[-5:]:
                  role = m.get('role','?')
                  content = str(m.get('content',''))[:500]
                  print(f'  [{role}] {content}', file=sys.stderr)
          except: pass
          " 2>&1 || echo "  (export failed)" >&2
              fi
            done
          ) &
          EXPORT_PID=$!

          # Run opencode with verbose logging so subagent activity is visible
          # in CI output in real-time (--print-logs sends internal logs to stderr).
          opencode run \
            --dangerously-skip-permissions \
            --print-logs \
            --log-level INFO \
            --model "deepseek/deepseek-v4-flash" \
            --agent build \
            --title "FlashDB C→Rust conversion" \
            "使用 c-to-rust skill 重构 C 语言的 flashdb 工程为 rust 语言。注意：1) PATH 和 LD_LIBRARY_PATH 已配置好，ir/translator/clang++ 直接可用，不需要 Docker。2) flashdb/compile_commands.json 已预生成且已添加 -x c 标志（强制 C 模式），跳过 Phase 1，不要修改 compile_commands.json。3) 输出目录必须是 rust-flashdb/（不是 flashdb-rust/）。4) 跳过 refactor passes，直接从 codegen 结果整合到 rust-flashdb/。5) 转换完成后立即停止，不要启动子 agent 探索代码。"

          # Stop the background export loop
          kill $EXPORT_PID 2>/dev/null || true

      - name: Export opencode session
        if: always()
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          export PATH="$(pwd)/.opencode/skills/c-to-rust/bin:$PATH"
          export LD_LIBRARY_PATH="$(pwd)/.opencode/skills/c-to-rust/lib:${LD_LIBRARY_PATH:-}"
          SESSION_ID=$(opencode session list --format json 2>/dev/null | python3 -c "
          import json, sys
          try:
              sessions = json.load(sys.stdin)
              if sessions:
                  print(sessions[0]['id'])
              else:
                  print('')
          except:
              print('')
          " || echo "")
          if [ -n "$SESSION_ID" ]; then
            echo "Exporting session: $SESSION_ID"
            opencode export "$SESSION_ID" > /tmp/opencode-session.json 2>&1 || echo "export failed"
          else
            echo "No session found to export"
            echo '{"error": "no session found"}' > /tmp/opencode-session.json
          fi

      - name: Upload opencode session
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-session
          path: /tmp/opencode-session.json
          retention-days: 30

      - name: Upload compile trajectory
        # One JSONL line per cargo check/build during the conversion.
        # OBSERVABILITY ONLY — this plugin never affects scoring or pass/fail.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-trajectory
          path: /tmp/compile-trajectory.jsonl
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload converted Rust code
        uses: actions/upload-artifact@v4
        with:
          name: rust-flashdb
          path: rust-flashdb/
          retention-days: 7

  # ============================================================
  # Job 2: 评测转换结果
  # ============================================================
  evaluate:
    name: "Evaluate: Compile + Test + Performance"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: convert
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download converted Rust code
        uses: actions/download-artifact@v4
        with:
          name: rust-flashdb
          path: rust-flashdb/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        continue-on-error: true
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y bc python3 && break
            echo "apt-get attempt $i failed, retrying in 10s..."
            sleep 10
          done

      # --- 编译评测 ---
      - name: "Evaluate: Compilation"
        id: compile
        run: |
          bash scripts/eval-compile.sh > /tmp/compile-result.json
          echo "result-file=/tmp/compile-result.json" >> $GITHUB_OUTPUT

      # --- 测试评测 ---
      - name: "Evaluate: Tests"
        id: tests
        run: |
          bash scripts/eval-tests.sh > /tmp/test-result.json
          echo "result-file=/tmp/test-result.json" >> $GITHUB_OUTPUT

      # --- C 构建工具 (功能等价 + 性能测试都需要) ---
      - name: Install C build tools
        continue-on-error: true
        run: sudo apt-get install -y gcc make || echo "gcc/make install failed, equiv/perf may fail"

      # --- 功能等价评测 ---
      - name: "Evaluate: FFI Equivalence"
        id: equiv
        run: |
          bash scripts/eval-equivalence.sh > /tmp/equiv-result.json 2>/tmp/equiv-detail.log
          echo "result-file=/tmp/equiv-result.json" >> $GITHUB_OUTPUT

      # --- 性能评测 ---
      - name: "Evaluate: Performance"
        id: perf
        run: |
          bash scripts/eval-performance.sh > /tmp/perf-result.json 2>/tmp/perf-detail.log
          echo "result-file=/tmp/perf-result.json" >> $GITHUB_OUTPUT

      # --- 聚合评分 ---
      - name: "Aggregate: Score"
        id: score
        run: |
          python3 scripts/aggregate-score.py \
            /tmp/compile-result.json \
            /tmp/test-result.json \
            /tmp/equiv-result.json \
            /tmp/perf-result.json \
            /tmp/eval-report.md

      # --- 输出报告 ---
      - name: "Report: Job Summary"
        if: always()
        run: |
          if [ -f /tmp/eval-report.md ]; then
            cat /tmp/eval-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ 评测报告生成失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请检查转换 Job 的输出。" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            /tmp/eval-report.md
            /tmp/compile-result.json
            /tmp/compile-detail.log
            /tmp/test-result.json
            /tmp/test-detail.log
            /tmp/equiv-result.json
            /tmp/equiv-detail.log
            /tmp/perf-result.json
            /tmp/perf-detail.log
          retention-days: 30

      - name: Fail if evaluation failed
        if: steps.score.outcome == 'failure'
        run: exit 1
